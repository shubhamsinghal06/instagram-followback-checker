<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Instagram Analyzer</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<div class="version">v1.0.0</div>

<h1>Instagram Analyzer</h1>
<p class="subtitle">Find users who don't follow you back</p>

<div class="file-box">

<label>Upload following.html</label>
<input type="file" id="followingFile" accept=".html">

</div>

<div class="file-box">

<label>Upload followers files</label>
<input type="file" id="followersFiles" accept=".html" multiple>

</div>

<button id="analyzeBtn">Analyze</button>

<div id="results"></div>

</div>

<script src="app.js"></script>

</body>
</html>
