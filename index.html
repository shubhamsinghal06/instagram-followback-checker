<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Instagram Followback Checker</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Instagram Followback Checker</h1>

<p class="subtitle">
Upload your Instagram export files to find accounts that do not follow you back.
</p>

<div class="card">

<div class="upload">
<label>Followers file</label>
<input type="file" id="followersFile">
</div>

<div class="upload">
<label>Following file</label>
<input type="file" id="followingFile">
</div>

<button id="analyzeBtn">Analyze</button>

</div>

<div class="results">

<h2>Not Following You Back</h2>

<ul id="result"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
